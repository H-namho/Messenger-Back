name: Spring Boot CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # 언제 이 워크플로우를 실행할지 정의
  # main 브랜치에 push 했을 때 실행
  # main 브랜치 대상으로 PR 생성/수정했을 때도 실행

jobs:
  build:
    runs-on: ubuntu-latest
    # GitHub가 우분투 환경에서 작업을 실행

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4
        # GitHub 저장소의 현재 코드를 러너(실행 서버)로 가져옴

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
        # Java 17 설치
        # distribution은 Temurin 사용
        # Gradle 캐시를 사용해서 빌드 속도를 개선

      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew
        # 리눅스 환경에서 gradlew 실행 권한을 부여
        # 이거 없으면 Permission denied 나는 경우가 있음

      - name: 테스트 제외 빌드 실행
        run: ./gradlew clean build -x test
        # 프로젝트 빌드 수행
        # -x test : 테스트는 제외
        # 지금 프로젝트 초기 단계에서는 DB 연결/시큐리티 세팅 등으로
        # 테스트가 자주 깨질 수 있어서 일단 빌드만 확인하는 방식

      # 나중에 테스트 코드가 안정화되면 아래 방식으로 바꾸는 걸 추천
      # run: ./gradlew clean build